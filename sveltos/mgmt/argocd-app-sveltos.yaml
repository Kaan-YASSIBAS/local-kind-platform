apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sveltos-clusters
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kaan-YASSIBAS/local-kind-platform.git
    targetRevision: HEAD
    path: sveltos/clusters
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true