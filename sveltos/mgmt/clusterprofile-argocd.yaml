apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: argocd
spec:
  clusterSelector:
    matchLabels:
      type: mgmt
  syncMode: Continuous
  helmCharts:
    - repositoryURL: https://argoproj.github.io/argo-helm
      repositoryName: argo
      chartName: argo/argo-cd
      chartVersion: 9.5.15
      releaseName: argocd
      releaseNamespace: argocd
      helmChartAction: Install