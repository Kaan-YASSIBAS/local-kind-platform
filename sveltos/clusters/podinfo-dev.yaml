apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: podinfo-dev
spec:
  clusterSelector:
    matchLabels:
      env: dev
  syncMode: Continuous
  helmCharts:
    - repositoryURL: https://stefanprodan.github.io/podinfo
      repositoryName: podinfo
      chartName: podinfo/podinfo
      chartVersion: 6.12.0
      releaseName: podinfo
      releaseNamespace: podinfo
      helmChartAction: Install
      values: |
        replicaCount: 2
        ui:
          color: "#34A853"
          message: "DEV v2 - synced by ArgoCD and deployed by Sveltos"
